<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REEL — Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080810; --glow: #5b3fff; --glow2: #ff3f8c;
      --accent: #c8ff57; --text: #eeeef5; --muted: #4a4a65;
      --surface: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.07);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }
    .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.15; animation: drift 18s ease-in-out infinite alternate; }
    .orb-1 { width: 600px; height: 600px; background: var(--glow); top: -200px; left: -150px; }
    .orb-2 { width: 500px; height: 500px; background: var(--glow2); bottom: -150px; right: -100px; animation-delay: -6s; }
    .orb-3 { width: 300px; height: 300px; background: #3fffcb; top: 40%; left: 60%; animation-delay: -10s; opacity: 0.06; }
    @keyframes drift { from{transform:translate(0,0) scale(1)} to{transform:translate(40px,30px) scale(1.08)} }
    body::after { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events:none; z-index:9999; }

    .top-bar { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:0.75rem 1.5rem; background:rgba(8,8,16,0.85); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); }
    .top-logo { font-size:1.4rem; font-weight:800; letter-spacing:-0.02em; background:linear-gradient(135deg,#fff 30%,#a78bff 70%,var(--glow2) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-decoration:none; }
    .back-btn { font-family:'Syne Mono',monospace; font-size:0.68rem; letter-spacing:0.07em; padding:0.3rem 0.85rem; border-radius:100px; border:1px solid var(--border); background:transparent; color:var(--muted); text-decoration:none; transition:all 0.15s; }
    .back-btn:hover { border-color:rgba(255,255,255,0.2); color:var(--text); }

    .wrap { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:6rem 1.5rem 5rem; }

    .hero { text-align:center; margin-bottom:3rem; animation:fadeUp 0.6s ease both; }
    .hero-title { font-size:clamp(3rem,8vw,6rem); font-weight:800; letter-spacing:-0.04em; line-height:1; background:linear-gradient(135deg,#fff 20%,#a78bff 60%,var(--glow2) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .hero-sub { font-family:'Syne Mono',monospace; font-size:0.7rem; letter-spacing:0.2em; color:var(--muted); text-transform:uppercase; margin-top:0.7rem; }
    .hero-count { display:inline-block; margin-top:1.2rem; font-family:'Syne Mono',monospace; font-size:0.75rem; letter-spacing:0.1em; color:var(--accent); background:rgba(200,255,87,0.08); border:1px solid rgba(200,255,87,0.2); padding:0.4rem 1.2rem; border-radius:100px; }

    .controls { display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap; margin-bottom:2rem; animation:fadeUp 0.6s 0.1s ease both; }
    .search-wrap { flex:1; min-width:200px; position:relative; }
    .search-input { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--text); font-family:'Syne Mono',monospace; font-size:0.78rem; padding:0.7rem 1rem 0.7rem 2.6rem; border-radius:10px; outline:none; transition:border-color 0.2s,background 0.2s; }
    .search-input::placeholder { color:var(--muted); }
    .search-input:focus { border-color:rgba(91,63,255,0.5); background:rgba(91,63,255,0.05); }
    .search-icon { position:absolute; left:0.9rem; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; font-size:0.85rem; }
    .filter-row { display:flex; gap:0.4rem; flex-wrap:wrap; }
    .cat-btn { font-family:'Syne Mono',monospace; font-size:0.62rem; letter-spacing:0.07em; padding:0.35rem 0.85rem; border-radius:100px; border:1px solid var(--border); background:var(--surface); color:var(--muted); cursor:pointer; transition:all 0.15s; white-space:nowrap; }
    .cat-btn:hover { border-color:rgba(255,255,255,0.2); color:var(--text); }
    .cat-btn.active { background:rgba(200,255,87,0.1); border-color:rgba(200,255,87,0.35); color:var(--accent); }

    .games-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:1.1rem; animation:fadeUp 0.6s 0.15s ease both; }
    .game-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; cursor:pointer; transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s; position:relative; }
    .game-card:hover { transform:translateY(-5px); box-shadow:0 24px 60px rgba(0,0,0,0.6); border-color:rgba(255,255,255,0.14); }
    .game-card.hot { border-color:rgba(200,255,87,0.2); }
    .hot-badge { position:absolute; top:0.6rem; left:0.6rem; font-family:'Syne Mono',monospace; font-size:0.54rem; letter-spacing:0.08em; background:rgba(200,255,87,0.15); border:1px solid rgba(200,255,87,0.35); color:var(--accent); padding:0.15rem 0.5rem; border-radius:100px; text-transform:uppercase; z-index:2; }
    .game-thumb { width:100%; height:130px; display:flex; align-items:center; justify-content:center; font-size:3.8rem; position:relative; overflow:hidden; }
    .thumb-bg { position:absolute; inset:0; opacity:0.2; transition:opacity 0.2s; }
    .game-card:hover .thumb-bg { opacity:0.32; }
    .thumb-emoji { position:relative; z-index:1; transition:transform 0.2s; filter:drop-shadow(0 4px 16px rgba(0,0,0,0.5)); }
    .game-card:hover .thumb-emoji { transform:scale(1.12); }
    .game-info { padding:0.9rem 1rem 1rem; }
    .game-name { font-size:0.92rem; font-weight:700; margin-bottom:0.25rem; }
    .game-desc { font-size:0.7rem; color:var(--muted); line-height:1.55; margin-bottom:0.75rem; }
    .game-bottom { display:flex; align-items:center; justify-content:space-between; gap:0.5rem; }
    .game-tag { font-family:'Syne Mono',monospace; font-size:0.56rem; letter-spacing:0.06em; padding:0.15rem 0.5rem; border-radius:100px; border:1px solid var(--border); color:var(--muted); }
    .play-btn { display:flex; align-items:center; gap:0.35rem; background:rgba(200,255,87,0.1); border:1px solid rgba(200,255,87,0.25); color:var(--accent); font-family:'Syne',sans-serif; font-size:0.7rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; padding:0.38rem 0.9rem; border-radius:8px; cursor:pointer; transition:background 0.15s,box-shadow 0.2s; white-space:nowrap; flex-shrink:0; }
    .play-btn:hover { background:rgba(200,255,87,0.2); box-shadow:0 0 16px rgba(200,255,87,0.2); }

    .no-results { text-align:center; padding:4rem; font-family:'Syne Mono',monospace; font-size:0.75rem; color:var(--muted); letter-spacing:0.1em; }

    /* Modal - full screen game viewer */
    .game-modal { position:fixed; inset:0; z-index:500; display:none; flex-direction:column; background:#000; }
    .game-modal.open { display:flex; }
    .modal-bar { display:flex; align-items:center; gap:0.75rem; padding:0.65rem 1.2rem; border-bottom:1px solid rgba(255,255,255,0.08); flex-shrink:0; background:#0a0a14; }
    .modal-close { width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.5); font-size:1rem; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.15s; flex-shrink:0; }
    .modal-close:hover { background:rgba(255,69,69,0.25); color:#fff; border-color:rgba(255,69,69,0.5); }
    .modal-game-name { font-size:0.95rem; font-weight:700; flex:1; }
    .modal-fs-btn { font-family:'Syne Mono',monospace; font-size:0.62rem; letter-spacing:0.07em; padding:0.28rem 0.75rem; border-radius:100px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:rgba(255,255,255,0.4); cursor:pointer; transition:all 0.15s; }
    .modal-fs-btn:hover { color:#fff; border-color:rgba(255,255,255,0.25); }
    .modal-game-frame { flex:1; width:100%; border:none; display:block; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @media(max-width:600px) { .games-grid { grid-template-columns:1fr 1fr; } .hero-title { font-size:2.8rem; } }
  </style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

<!-- Full screen game modal -->
<div class="game-modal" id="gameModal">
  <div class="modal-bar">
    <button class="modal-close" onclick="closeGame()">✕</button>
    <span class="modal-game-name" id="modalTitle"></span>
    <button class="modal-fs-btn" onclick="goFullscreen()">⛶ Fullscreen</button>
  </div>
  <iframe class="modal-game-frame" id="gameFrame" allowfullscreen allow="fullscreen *; autoplay *; cross-origin-isolated" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-orientation-lock allow-pointer-lock"></iframe>
</div>

<div class="top-bar">
  <a class="top-logo" href="index.html">reel</a>
  <a class="back-btn" href="index.html">← Back to REEL</a>
</div>

<div class="wrap">
  <div class="hero">
    <div class="hero-title">Games</div>
    <div class="hero-sub">// Click play and start instantly</div>
    <div class="hero-count" id="heroCount">0 games</div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" placeholder="Search games…" oninput="render()" />
    </div>
    <div class="filter-row" id="filterRow"></div>
  </div>

  <div class="games-grid" id="gamesGrid"></div>
</div>

<script>
const GAMES = [
  { name:'Run 3',                emoji:'🏃', bg:'#9c27b0', desc:'Run, jump and skate through an endless tunnel in space.',         tags:['arcade','endless'],   cat:'arcade',      file:'clrun3.html',              hot:true  },
  { name:'Slope 3',              emoji:'🔵', bg:'#2196f3', desc:'Roll a neon ball down a 3D slope at insane speeds.',              tags:['arcade','reflex'],    cat:'arcade',      file:'clslope3.html',            hot:true  },
  { name:'Slope 2 Player',       emoji:'🟣', bg:'#673ab7', desc:'Race a friend down the slope on the same keyboard.',             tags:['2 player','arcade'],  cat:'multiplayer', file:'clslope2player.html'                },
  { name:'1v1.LOL',              emoji:'🏗️', bg:'#ff5722', desc:'Build cover and blast opponents in this quick shooter.',         tags:['action','build'],     cat:'action',      file:'cl1v1lol.html',            hot:true  },
  { name:'Blockpost',            emoji:'🎯', bg:'#f44336', desc:'Pixel art first-person shooter — multiple maps and modes.',      tags:['fps','action'],       cat:'action',      file:'clblockpost.html',         hot:true  },
  { name:'Time Shooter 2',       emoji:'⏱️', bg:'#607d8b', desc:'Time only moves when you move. Dodge and shoot in slow motion.', tags:['action','puzzle'],    cat:'action',      file:'cltimeshooter2.html',      hot:true  },
  { name:'Time Shooter 3',       emoji:'🕐', bg:'#455a64', desc:'SWAT edition — time-bending tactical shooter.',                 tags:['action','tactics'],   cat:'action',      file:'cltimeshooter3.html'                },
  { name:'Rooftop Snipers',      emoji:'🎳', bg:'#795548', desc:'2-player rooftop duels. Knock your opponent off the edge!',     tags:['2 player','action'],  cat:'multiplayer', file:'clrooftopsnipers.html',    hot:true  },
  { name:'Strike Force Heroes',  emoji:'💥', bg:'#e91e63', desc:'Classic side-scrolling shooter with RPG-style upgrades.',       tags:['shooter','rpg'],      cat:'action',      file:'clstrikeforceheroes.html'           },
  { name:'Strike Force Heroes 2',emoji:'🔫', bg:'#c2185b', desc:'More guns, more chaos — even better than the original.',       tags:['shooter','rpg'],      cat:'action',      file:'clstrikeforceheroes2.html'          },
  { name:'Strike Force Heroes 3',emoji:'🚀', bg:'#ad1457', desc:'The finale — new characters, new missions, same great action.', tags:['shooter','rpg'],      cat:'action',      file:'clstrikeforceheroes3.html'          },
  { name:'Minecraft 1.11.2',     emoji:'⛏️', bg:'#795548', desc:'Play Minecraft right in your browser via Eaglercraft.',        tags:['sandbox','survival'], cat:'sandbox',     file:'clEaglercraftZ_1112.html', hot:true  },
];

const CATS = ['all','arcade','action','multiplayer','sandbox'];
let activeCat = 'all';

/* Build filter tabs */
CATS.forEach(cat => {
  const b = document.createElement('button');
  b.className = 'cat-btn' + (cat==='all'?' active':'');
  b.textContent = cat === 'all' ? 'All' : cat.charAt(0).toUpperCase()+cat.slice(1);
  b.onclick = () => {
    activeCat = cat;
    document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    render();
  };
  document.getElementById('filterRow').appendChild(b);
});

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = GAMES.filter(g => {
    if (activeCat !== 'all' && g.cat !== activeCat) return false;
    if (q && !g.name.toLowerCase().includes(q) && !g.desc.toLowerCase().includes(q) && !g.tags.join(' ').includes(q)) return false;
    return true;
  });

  document.getElementById('heroCount').textContent = GAMES.length + ' games';
  const grid = document.getElementById('gamesGrid');
  grid.innerHTML = '';

  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results" style="grid-column:1/-1;">No games found — try a different search.</div>';
    return;
  }

  filtered.forEach(g => {
    const card = document.createElement('div');
    card.className = 'game-card' + (g.hot ? ' hot' : '');
    card.innerHTML = `
      ${g.hot ? '<div class="hot-badge">🔥 Hot</div>' : ''}
      <div class="game-thumb">
        <div class="thumb-bg" style="background:${g.bg}"></div>
        <span class="thumb-emoji">${g.emoji}</span>
      </div>
      <div class="game-info">
        <div class="game-name">${g.name}</div>
        <div class="game-desc">${g.desc}</div>
        <div class="game-bottom">
          <span class="game-tag">${g.tags[0]}</span>
          <button class="play-btn">▶ Play</button>
        </div>
      </div>`;
    card.querySelector('.play-btn').addEventListener('click', () => playGame(g));
    grid.appendChild(card);
  });
}

function playGame(g) {
  document.getElementById('modalTitle').textContent = g.name;
  const frame = document.getElementById('gameFrame');
  // Set src to the game file in the same directory
  frame.src = g.file;
  document.getElementById('gameModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeGame() {
  document.getElementById('gameModal').classList.remove('open');
  document.body.style.overflow = '';
  // Delay clearing src so the modal closes smoothly first
  setTimeout(() => { document.getElementById('gameFrame').src = ''; }, 300);
}

function goFullscreen() {
  const modal = document.getElementById('gameModal');
  if (modal.requestFullscreen) modal.requestFullscreen();
  else if (modal.webkitRequestFullscreen) modal.webkitRequestFullscreen();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGame(); });

render();
</script>
</body>
</html>
